services:
  web:
    build: .
    ports:
      - "8090:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: twitchspawn_builder
      MYSQL_USER: twitchspawn_builder
      MYSQL_PASSWORD: localdev
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  db-data:
